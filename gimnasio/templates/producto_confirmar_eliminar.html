{% extends "base.html" %}
{% load static %}
{% block content %}
<div class="container page-container container-narrow py-4">
    <div class="card">
        <div class="card-body">
            <h2 class="mb-3">Confirmar Eliminación</h2>
            <p>¿Estás seguro de que deseas eliminar el producto "{{ producto.descripcion }}"?</p>
            <form method="post" class="d-flex flex-wrap gap-2">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Eliminar</button>
                <a href="{% url 'producto_list' %}" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
