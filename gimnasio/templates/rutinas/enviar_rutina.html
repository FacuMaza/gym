{% extends "base.html" %}
{% block content %}
<div class="container page-container py-4">
    <h2 class="fw-bold mb-3">Publicar rutina</h2>
    <p>Se publicará <strong>{{ rutina.titulo }}</strong> en la cuenta de todos los socios de la categoría <strong>{{ rutina.categoria.nombre }}</strong>. No se envían notificaciones.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-primary">Enviar</button>
        <a href="{% url 'rutinas_lista' %}" class="btn btn-outline-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
