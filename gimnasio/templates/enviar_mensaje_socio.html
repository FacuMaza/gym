{% extends "base.html" %}
{% block content %}
<div class="container page-container py-4">
    <div class="card shadow border-0">
        <div class="card-body">
            <h2 class="card-title mb-3">Enviar mensaje a {{ socio.nombre }} {{ socio.apellido }}</h2>
            <p class="text-muted mb-3">
                Celular registrado: <strong>{{ socio.celular|default:"(no cargado)" }}</strong>
            </p>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Canal</label>
                    <select name="canal" class="form-select" required>
                        <option value="sms">SMS (Twilio)</option>
                        <option value="whatsapp">WhatsApp (Twilio)</option>
                        <option value="email">Email</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email (solo si elegís canal Email)</label>
                    <input type="email" name="email" class="form-control" placeholder="correo@ejemplo.com">
                </div>
                <div class="mb-3">
                    <label class="form-label">Mensaje</label>
                    <textarea name="mensaje" class="form-control" rows="4" required></textarea>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Enviar</button>
                    <a href="{% url 'detalle_socio' socio.pk %}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
