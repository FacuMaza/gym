{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="container page-container py-4">
    <div class="card">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
                <h2 class="card-title mb-0">Lista de Gimnasios</h2>
                <a href="{% url 'gimnasio_crear' %}" class="btn btn-primary">Agregar Gimnasio</a>
            </div>
            <div class="row g-3 justify-content-center">
                {% for gimnasio in gimnasios %}
                <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                    <div class="card h-100">
                        <div class="card-body">
                            <a href="{% url 'gimnasio_detalle' gimnasio.pk %}" class="btn btn-outline-secondary w-100 text-start">
                                <div class="fw-semibold">{{ gimnasio.nombre|default:"Sin nombre" }}</div>
                                <small class="text-muted d-block">{{ gimnasio.direccion|default:"Sin dirección" }}</small>
                            </a>
                        </div>
                    </div>
                </div>
                {% empty %}
                <p class="text-muted text-center mb-0">No hay gimnasios registrados.</p>
                {% endfor %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
