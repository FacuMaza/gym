{% extends 'base.html' %}
{% block content %}
<div class="container page-container py-4">
    <div class="card">
        <div class="card-body">
            <h5>¿Eliminar gasto?</h5>
            <p>{{ gasto.descripcion }} - $ {{ gasto.monto|moneda_ar }} ({{ gasto.fecha|date:"d/m/Y" }})</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                <a href="{% url 'gastos_list' %}" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
