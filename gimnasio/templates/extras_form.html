{% extends 'base.html' %}

{% block content %}
<div class="container page-container py-4">
        <div class="card">
           <div class="card-body">
               <h2 class="card-title">{{ title }}</h2>
                 <div class="table-container">
                       <table class="table table-striped">
                         <tbody>
                             <form method="post">
                                {% csrf_token %}
                                 {% for field in form %}
                                      <tr>
                                          <th>{{ field.label_tag }}</th>
                                          <td>{{ field }}
                                               {% if field.errors %}
                                                   <ul class="errorlist">
                                                        {% for error in field.errors %}
                                                          <li>{{ error }}</li>
                                                        {% endfor %}
                                                   </ul>
                                               {% endif %}
                                           </td>
                                      </tr>
                                  {% endfor %}
                             </tbody>
                       </table>
                         <div class="button-container">
                              <button type="submit" class="btn btn-primary">Guardar</button>
                              <a href="{% url 'extras_list' %}" class="btn btn-secondary">Cancelar</a>
                         </div>
                      </form>
                   </div>
            </div>
        </div>
    </div>

{% endblock %}
