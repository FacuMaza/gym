{% extends 'base.html' %}
{% block content %}
<div class="container page-container container-narrow py-4">
    <div class="card">
        <div class="card-body">
            <h2 class="mb-3">Eliminar Tipo de Mensualidad</h2>
            <p>¿Estás seguro de que quieres eliminar el tipo de mensualidad <strong>{{ tipo.tipo }}</strong> con precio <strong>$ {{ tipo.precio|moneda_ar }}</strong>?</p>
            <form method="post" class="d-flex flex-wrap gap-2">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                <a href="{% url 'detalle_plan_mensualidad' tipo.categoria_id %}" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
