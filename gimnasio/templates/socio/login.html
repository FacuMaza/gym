{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso socios — GYM-PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 40%, #334155 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .login-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 2rem;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4);
        }
        .brand { text-align: center; color: white; margin-bottom: 1.5rem; }
        .brand h1 { font-weight: 800; margin: 0; }
        .brand h1 span { color: #38bdf8; }
        .btn-login {
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
            border: none;
            font-weight: 600;
            width: 100%;
        }
    </style>
</head>
<body>
    <div>
        <div class="brand">
            <h1>GYM<span>-PRO</span></h1>
            <p class="mb-0 opacity-75">Portal del socio</p>
        </div>
        <div class="login-card">
            <h2 class="h5 mb-3">Ingresá con tu DNI</h2>
            {% if error %}
            <div class="alert alert-danger py-2">{{ error }}</div>
            {% endif %}
            <form method="post">
                {% csrf_token %}
                {% if gym_id %}<input type="hidden" name="gym" value="{{ gym_id }}">{% endif %}
                <div class="mb-3">
                    <label class="form-label" for="dni">DNI</label>
                    <input type="text" name="dni" id="dni" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="password">Contraseña</label>
                    <input type="password" name="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary btn-login">Entrar</button>
            </form>
        </div>
    </div>
</body>
</html>
