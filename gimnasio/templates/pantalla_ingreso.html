{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="container page-container py-4 py-md-5">
    <div class="card shadow-lg border-0">
        <div class="card-body text-center p-4 p-md-5">
            <h2 class="mb-4">Pantalla de Ingreso</h2>
            <p class="text-muted mb-4">Abre la pantalla de ingreso en una nueva ventana para que los socios puedan registrar su ingreso con el DNI.</p>
            <button type="button" class="btn btn-primary btn-lg px-4 px-md-5" onclick="abrirPantalla()">
                Abrir Pantalla de Ingreso
            </button>
        </div>
    </div>
</div>
<script>
function abrirPantalla() {
    const gymId = '{{ gimnasio_actual.id|default:"" }}';
    const url = "{% url 'pantalla_ingreso_kiosk' %}" + (gymId ? '?gym=' + gymId : '');
    var w = Math.min(900, window.screen.availWidth || 900);
    var h = Math.min(700, window.screen.availHeight || 700);
    window.open(url, 'pantallaIngreso', 'width=' + w + ',height=' + h + ',left=0,top=0,scrollbars=no,resizable=yes');
}
</script>
{% endblock %}
