{% extends 'base.html' %}
{% block content %}
<div class="container page-container py-4">
    <div class="card shadow">
        <div class="card-body">
            <h2 class="card-title mb-4">Asignar Mensualidad</h2>
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                {% if field.name != 'tipo_mensualidad' %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}<div class="text-danger small">{{ field.errors.0 }}</div>{% endif %}
                </div>
                {% endif %}
                {% endfor %}
                <div class="mb-3">
                    <label class="form-label">Categoría</label>
                    <select id="categoria-select" class="form-select">
                        <option value="">-- Seleccionar categoría --</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Seleccionar Nueva Mensualidad</label>
                    <select name="tipo_mensualidad" id="id_tipo_mensualidad" class="form-select"
                            data-initial-tipo="{{ initial_tipo_id|default:'' }}"
                            data-initial-cat="{{ initial_categoria_id|default:'' }}">
                        <option value="">--------</option>
                    </select>
                </div>
                <div class="mt-4">
                    <button type="submit" class="btn btn-primary">Asignar</button>
                    <a href="{% url 'lista_cuotas' %}" class="btn btn-secondary">Volver</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
(function() {
    const catSelect = document.getElementById('categoria-select');
    const tipoSelect = document.getElementById('id_tipo_mensualidad');
    if (!tipoSelect || !catSelect) return;

    const gymId = '{{ gimnasio_actual.id|default:"" }}';
    fetch('{% url "api_categorias" %}' + (gymId ? '?gimnasio_id=' + gymId : '')).then(r=>r.json()).then(cats=>{
        cats.forEach(c=>{
            const opt = document.createElement('option');
            opt.value = c.id;
            opt.textContent = c.nombre;
            catSelect.appendChild(opt);
        });
    });

    function cargarMensualidades(cid, selectTipoId) {
        tipoSelect.innerHTML = '<option value="">--------</option>';
        if (!cid) return;
        fetch('{% url "api_mensualidades_por_categoria" %}?categoria_id='+cid).then(r=>r.json()).then(ms=>{
            ms.forEach(m=>{
                const opt = document.createElement('option');
                opt.value = m.id;
                opt.textContent = m.tipo + ' - $' + formatMonedaAR(m.precio, 0) + (m.frecuencia ? ' ('+m.frecuencia+')' : '');
                if (selectTipoId && m.id == selectTipoId) opt.selected = true;
                tipoSelect.appendChild(opt);
            });
        });
    }

    catSelect.addEventListener('change', function(){ cargarMensualidades(this.value, null); });

    const initCat = tipoSelect.dataset.initialCat;
    const initTipo = tipoSelect.dataset.initialTipo;
    if (initCat) {
        catSelect.value = initCat;
        cargarMensualidades(initCat, initTipo);
    }
})();
</script>
{% endblock %}
