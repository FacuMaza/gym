{% extends 'base.html' %}
{% block content %}
<div class="container page-container container-narrow py-4">
    <div class="card">
        <div class="card-body">
            <h2 class="mb-3">Eliminar Socio</h2>
            <p>¿Estás seguro que deseas eliminar al socio <strong>{{ socio.nombre }} {{ socio.apellido }}</strong>?</p>
            <form method="post" class="d-flex flex-wrap gap-2">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Eliminar</button>
                <a href="{% url 'lista_socios' %}" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
