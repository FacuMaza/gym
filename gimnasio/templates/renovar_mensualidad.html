{% extends 'base.html' %}
{% block content %}
<div class="container page-container py-4">
        <div class="card">
            <div class="card-body">
                <h2 class="card-title">Renovar Mensualidad de {{ socio.nombre }} {{ socio.apellido }}</h2>
                <p class="fs-5 mb-4">¿Qué tipo de renovación deseas realizar?</p>
                <div class="d-flex flex-wrap gap-2">
                    <button type="button" class="btn btn-primary" onclick="confirmarRenovacion()">Renovar Automático</button>
                    <a href="{% url 'lista_cuotas' %}" class="btn btn-secondary">Cancelar</a>
                </div>
           </div>
        </div>
    </div>
<script>
    function confirmarRenovacion() {
    const confirmar = confirm("¿Estás seguro de que deseas realizar la renovación automática?");
    if (confirmar) {
      window.location.href = "{% url 'asignar_mensualidad' %}?socio={{ socio.id }}";
        }
    }
    </script>
    
{% endblock %}
