{% extends 'base.html' %}
{% block content %}
<div class="container page-container container-narrow py-4">
    <div class="card">
        <div class="card-body">
            <h2 class="mb-4">{% if accion == 'Crear' %}Crear{% else %}Editar{% endif %} Gimnasio</h2>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">{{ form.as_p }}</div>
                <div class="d-flex flex-wrap gap-2">
                    <button type="submit" class="btn btn-success">Guardar</button>
                    <a href="{% url 'gimnasio_lista' %}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
