{% extends 'base.html' %}

{% block content %}
<div class="container page-container container-narrow py-4">
  <div class="card">
    <div class="card-body">
      <h2 class="mb-4">Seleccionar Fecha de Renovaci?n</h2>
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="d-flex flex-wrap gap-2 mt-3">
          <button type="submit" class="btn btn-primary">Confirmar Renovaci?n</button>
          <a href="{% url 'lista_cuotas' %}" class="btn btn-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
