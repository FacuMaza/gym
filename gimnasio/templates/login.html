{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — GYM-PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --accent: #38bdf8;
            --accent-hover: #7dd3fc;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 40%, #334155 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3rem;
            max-width: 900px;
            width: 100%;
        }
        .brand {
            flex: 1;
            text-align: center;
        }
        .brand h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 800;
            color: white;
            letter-spacing: -0.03em;
            margin: 0;
            text-shadow: 0 2px 20px rgba(56, 189, 248, 0.3);
        }
        .brand h1 span {
            color: var(--accent);
        }
        .brand p {
            color: rgba(255,255,255,0.6);
            font-size: 1rem;
            margin-top: 0.5rem;
        }
        .login-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 380px;
        }
        .login-card h2 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #334155;
            margin-bottom: 1.5rem;
        }
        .form-control {
            border-radius: 12px;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
        }
        .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }
        .form-label {
            font-weight: 500;
            color: #475569;
        }
        .btn-login {
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
            border: none;
            border-radius: 12px;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            width: 100%;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%);
            transform: translateY(-1px);
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.3);
        }
        .recover-link {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: #64748b;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .recover-link:hover { color: var(--accent); }
        @media (max-width: 768px) {
            .login-wrapper { flex-direction: column; }
            .brand h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="brand">
            <h1>GYM<span>-PRO</span></h1>
            <p>Gestión de gimnasios</p>
        </div>
        <div class="login-card">
            <h2>Iniciar sesión</h2>
            {% if error %}
            <div class="alert alert-danger py-2" role="alert">{{ error }}</div>
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="username" class="form-label">Usuario</label>
                    <input type="text" name="username" id="username" class="form-control" placeholder="Tu usuario" required autofocus>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" name="password" id="password" class="form-control" placeholder="Tu contraseña" required>
                </div>
                <button type="submit" class="btn btn-primary btn-login">Ingresar</button>
            </form>
            <a href="{% url 'password_reset_request' %}" class="recover-link">Recuperar contraseña</a>
        </div>
    </div>
</body>
</html>
