{% extends 'base.html' %}
{% block content %}
<div class="container page-container py-4">
    <h2 class="mb-4">Historiales</h2>
    <p class="text-muted mb-4">Consulte ingresos y gastos por gimnasio</p>

    <form method="get" action="{% url 'historiales_reporte' %}" class="card p-4 mb-4">
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label">Período</label>
                <select name="periodo" id="periodo" class="form-select" required>
                    <option value="diario" {% if request.GET.periodo == 'diario' or not request.GET.periodo %}selected{% endif %}>Diario</option>
                    <option value="mensual" {% if request.GET.periodo == 'mensual' %}selected{% endif %}>Mensual</option>
                    <option value="anual" {% if request.GET.periodo == 'anual' %}selected{% endif %}>Anual</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Gimnasio</label>
                <select name="gimnasio" class="form-select" required>
                    {% for g in gimnasios %}
                    <option value="{{ g.id }}" {% if gimnasio_actual and gimnasio_actual.id == g.id %}selected{% endif %}>
                        {{ g.nombre|default:g.direccion|default:"Gimnasio" }}
                    </option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="row g-3 mt-1" id="fila-diario">
            <div class="col-md-4">
                <label class="form-label">Fecha</label>
                <input type="date" name="fecha" id="input-fecha" class="form-control">
            </div>
        </div>
        <div class="row g-3 mt-1 d-none" id="fila-mensual">
            <div class="col-md-2">
                <label class="form-label">Mes</label>
                <select name="mes" id="input-mes" class="form-select">
                    <option value="1">Enero</option><option value="2">Febrero</option><option value="3">Marzo</option>
                    <option value="4">Abril</option><option value="5">Mayo</option><option value="6">Junio</option>
                    <option value="7">Julio</option><option value="8">Agosto</option><option value="9">Septiembre</option>
                    <option value="10">Octubre</option><option value="11">Noviembre</option><option value="12">Diciembre</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">Año</label>
                <input type="number" name="anio" id="input-anio" class="form-control" min="2020" max="2030">
            </div>
        </div>
        <div class="row g-3 mt-1 d-none" id="fila-anual">
            <div class="col-md-2">
                <label class="form-label">Año</label>
                <input type="number" name="anio" id="input-anio2" class="form-control" min="2020" max="2030">
            </div>
        </div>
        <div class="mt-4">
            <button type="submit" class="btn btn-primary">Ver reporte</button>
        </div>
    </form>

    <script>
    (function() {
        var hoy = new Date();
        document.getElementById('input-fecha').value = hoy.getFullYear() + '-' + String(hoy.getMonth()+1).padStart(2,'0') + '-' + String(hoy.getDate()).padStart(2,'0');
        document.getElementById('input-anio').value = document.getElementById('input-anio2').value = hoy.getFullYear();
        document.getElementById('input-mes').value = String(hoy.getMonth()+1);
        function toggle() {
            var p = document.getElementById('periodo').value;
            document.getElementById('fila-diario').classList.toggle('d-none', p !== 'diario');
            document.getElementById('fila-mensual').classList.toggle('d-none', p !== 'mensual');
            document.getElementById('fila-anual').classList.toggle('d-none', p !== 'anual');
            document.getElementById('input-fecha').disabled = (p !== 'diario');
            document.getElementById('input-mes').disabled = (p !== 'mensual');
            document.getElementById('input-anio').disabled = (p !== 'mensual');
            document.getElementById('input-anio2').disabled = (p !== 'anual');
            document.getElementById('input-fecha').name = (p === 'diario') ? 'fecha' : '';
            document.getElementById('input-mes').name = (p === 'mensual') ? 'mes' : '';
            document.getElementById('input-anio').name = (p === 'mensual') ? 'anio' : '';
            document.getElementById('input-anio2').name = (p === 'anual') ? 'anio' : '';
        }
        document.getElementById('periodo').addEventListener('change', toggle);
        toggle();
    })();
    </script>
</div>
{% endblock %}
