{% extends 'base.html' %}

{% block content %}
<div class="container page-container py-4">
        <div class="card">
            <div class="card-body">
                <h2 class="card-title">Recuperar Contraseña</h2>
                <form method="post">
                    {% csrf_token %}
                    {% if error %}
                        <p style="color: red;">{{ error }}</p>
                    {% endif %}
                     <table class="table table-striped">
                        <tbody>
                            <tr>
                                <th><label for="usuario">Nombre de Usuario:</label></th>
                                <td><input type="text" name="usuario" required></td>
                            </tr>
                        </tbody>
                    </table>
                    <div class="button-container">
                       <button type="submit" class="btn btn-primary">Siguiente</button>
                     </div>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
