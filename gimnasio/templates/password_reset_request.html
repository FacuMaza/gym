{% extends 'base.html' %}

{% block content %}
<div class="container page-container py-4">
        <div class="card">
            <div class="card-body">
                <h2 class="card-title">Recuperar Contraseña</h2>
                <form method="post">
                    {% csrf_token %}
                    {% if error %}
                        <p style="color: red;">{{ error }}</p>
                    {% endif %}
                    <div class="mb-3">
                        <label for="usuario" class="form-label">Nombre de Usuario</label>
                        <input type="text" name="usuario" id="usuario" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 w-sm-auto">Siguiente</button>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
