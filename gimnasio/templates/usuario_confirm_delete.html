{% extends 'base.html' %}
{% block content %}
<div class="container page-container container-narrow py-4">
    <div class="card">
        <div class="card-body">
            <h2 class="mb-3">Confirmar Eliminación</h2>
            <p>¿Estás seguro de que quieres eliminar el usuario: <strong>{{ usuario.usuario }}</strong>?</p>
            <form method="post" class="d-flex flex-wrap gap-2">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Sí, Eliminar</button>
                <a href="{% url 'usuario_list' %}" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
