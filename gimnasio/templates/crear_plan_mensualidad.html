{% extends 'base.html' %}
{% block content %}
<div class="container page-container py-4">
    <div class="card shadow" style="max-width: 500px;">
        <div class="card-body">
            <h2 class="card-title mb-4">Nueva mensualidad</h2>
            <p class="text-muted mb-3">Dale el nombre que quieras al plan (ej: Plan Fitness, Taebo, etc.)</p>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">{{ form.nombre.label }}</label>
                    {{ form.nombre }}
                    {% if form.nombre.errors %}<div class="text-danger small">{{ form.nombre.errors.0 }}</div>{% endif %}
                </div>
                <button type="submit" class="btn btn-success">Crear</button>
                <a href="{% url 'lista_tipos_mensualidad' %}" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
